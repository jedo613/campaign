  .rel-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }

</head>

  '도봉구': [{ sub: '갑', name: '김재섭', career: '現 의원(초선)', career2: '' }, { sub: '을', name: '김선동', career: '前 18·20대 의원', career2: '前 당 사무총장' }],
  '노원구': [{ sub: '갑', name: '현경병', career: '前 18대 의원', career2: '' }, { sub: '을', name: '박한석', career: '現 국민의힘 부대변인', career2: '' }],
  '동대문구': [{ sub: '을', name: '김경진', career: '前 20대 의원', career2: '' }],
  '중랑구': [{ sub: '을', name: '민병주', career: '現 8회 서울시의원', career2: '' }],
  '광진구': [{ sub: '갑', name: '박성연', career: '現 서울시의원', career2: '' }, { sub: '을', name: '오신환', career: '前 19·20대 의원', career2: '前 서울시 정무부시장' }],
  '서초구': [{ sub: '갑', name: '조은희', career: '現 의원(재선)', career2: '前 서초구청장' }, { sub: '을', name: '신동욱', career: '現 의원(초선)', career2: '前 TV조선 앵커' }],
  '강남구': [{ sub: '갑', name: '서명옥', career: '現 의원(초선)', career2: '' }, { sub: '을', name: '박수민', career: '現 의원(초선)', career2: '', self: true }, { sub: '병', name: '고동진', career: '現 의원(초선)', career2: '前 삼성전자 대표' }],
  '송파구': [{ sub: '갑', name: '박정훈', career: '現 의원(초선)', career2: 'TV조선' }, { sub: '을', name: '배현진', career: '現 의원(재선)', career2: '前 당 최고위원' }, { sub: '병', name: '김근식', career: '現 경남대 교수', career2: '' }],
  '강동구': [{ sub: '갑', name: '전주혜', career: '前 21대 의원', career2: '前 부장판사' }, { sub: '을', name: '이재영', career: '前 19대 의원', career2: '前 당 최고위원' }],
};

let mapObj, geojsonLayer;
let labelLayer = L.layerGroup();
let labelsVisible = true;
let tempPeople = [];
let selectedRel = null;
let selectedGu = null;
let activeFilter = 'all';
let isConnected = false;

function getVisits() { return window._getVisits ? window._getVisits() : []; }
function getGuName(f) { const p = f.properties; return p.SIG_KOR_NM || p.name_kor || p.NAME_KOR || p.name || ''; }
function getVisitCount(gu) { return getVisits().filter(v => v.gu === gu).length; }
function getFillColor(n) { if (n===0) return '#1a1d24'; if (n===1) return '#1a3060'; if (n<=3) return '#1a5090'; return '#c8a96e'; }

// 연결 상태 표시
function setConnected(on) {
  isConnected = on;
  document.getElementById('sync-dot').className = 'sync-dot' + (on ? ' live' : '');
  document.getElementById('sync-label').textContent = on ? '실시간 동기화' : '연결 중...';
}

// Firebase 연동 함수들 (모듈에서 window에 노출)
async function fbAddVisit(data) {
  if (window._fbPush) { await window._fbPush(data); }
}
async function fbDeleteVisit(key) {
  if (window._fbRemove) { await window._fbRemove(key); }
}

// updateAll — Firebase onValue 콜백에서 호출됨
window.updateAll = function() {
  setConnected(true);
  updateStats(); refreshLayer(); renderLog(); renderContacts();
  if (selectedGu) updateDistrictPanel();
  addLabels();
};

function makeLabelHTML(gu, zoom) {
  const data = DANGHYUP[gu]; if (!data || !data.length) return null;
  const nameSize = zoom>=13?12:zoom>=12?10:zoom>=11?9:8;
  const careerSize = zoom>=13?9:zoom>=12?8:7;
  const showCareer = zoom>=11, showSub = zoom>=12 && data.length>1;
  let html = '<div class="gu-label"><div class="dang-row">';
  data.forEach((d, i) => {
    if (i>0) html += '<div class="divider"></div>';
    html += '<div class="dang-item">';
    if (showSub && d.sub) html += `<div class="dang-sub" style="font-size:${careerSize-1}px">${d.sub}</div>`;
    html += `<div class="dang-name${d.self?' self':''}" style="font-size:${nameSize}px">${d.name}</div>`;
    if (showCareer && d.career) html += `<div class="dang-career" style="font-size:${careerSize}px">${d.career}</div>`;
    html += '</div>';
  });
  html += '</div></div>'; return html;
}

function addLabels() {
  labelLayer.clearLayers(); if (!geojsonLayer || !labelsVisible) return;
  const zoom = mapObj.getZoom();
  geojsonLayer.eachLayer(layer => {
    const gu = getGuName(layer.feature);
    const html = makeLabelHTML(gu, zoom); if (!html) return;
    const center = layer.getBounds().getCenter();
    const icon = L.divIcon({ html, className: 'leaflet-div-icon', iconSize: [120, 60], iconAnchor: [60, 30] });
    L.marker(center, { icon, interactive: false, zIndexOffset: 100 }).addTo(labelLayer);
  });
}

function addPerson() {
  const name = document.getElementById('inp-person').value.trim();
  const role = document.getElementById('sel-role').value;
  if (!name) return;
  tempPeople.push({ name, role });
  document.getElementById('inp-person').value = '';
  renderTempPeople();
}
function removePerson(i) { tempPeople.splice(i, 1); renderTempPeople(); }
function renderTempPeople() {
  document.getElementById('people-tags').innerHTML = tempPeople.map((p, i) => `
    <div class="person-tag"><span class="role-badge role-${p.role}">${p.role}</span>${p.name}
      <button class="del-person" data-i="${i}">×</button></div>`).join('');
  document.querySelectorAll('.del-person').forEach(b => b.addEventListener('click', () => removePerson(parseInt(b.dataset.i))));
}

document.addEventListener('click', e => {
  if (e.target.classList.contains('rel-btn')) {
    const rel = e.target.dataset.rel;
    document.querySelectorAll('.rel-btn').forEach(b => b.className = 'rel-btn');
    if (selectedRel === rel) { selectedRel = null; return; }
    selectedRel = rel; e.target.classList.add('active-' + rel);
  }
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active'); activeFilter = e.target.dataset.filter; renderLog();
  }
  if (e.target.classList.contains('vc-del')) {
    fbDeleteVisit(e.target.dataset.key);
  }
});

document.getElementById('btn-add-visit').addEventListener('click', async () => {
  const place = document.getElementById('inp-place').value.trim();
  const date = document.getElementById('inp-date').value;
  const note = document.getElementById('inp-note').value.trim();
  if (!place || !selectedGu || !date) return;
  const btn = document.getElementById('btn-add-visit');
  btn.disabled = true; btn.textContent = '저장 중...';
  await fbAddVisit({ gu: selectedGu, place, date, note, people: tempPeople, relation: selectedRel || null, ts: Date.now() });
  document.getElementById('inp-place').value = '';
  document.getElementById('inp-note').value = '';
  tempPeople = []; selectedRel = null;
  document.querySelectorAll('.rel-btn').forEach(b => b.className = 'rel-btn');
  renderTempPeople();
  btn.disabled = false; btn.textContent = '기록 추가';
});

document.getElementById('btn-add-person').addEventListener('click', addPerson);
document.getElementById('inp-person').addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); addPerson(); } });
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});
document.getElementById('toggle-labels').addEventListener('click', function() {
  labelsVisible = !labelsVisible;
  this.classList.toggle('on', labelsVisible);
  this.textContent = labelsVisible ? '당협위원장 표시' : '당협위원장 숨김';
  addLabels();
});

function updateStats() {
  const visits = getVisits();
  document.getElementById('stat-visits').textContent = visits.length;
  document.getElementById('stat-gu').textContent = new Set(visits.map(v => v.gu)).size + ' / 25';
  const names = new Set(); visits.forEach(v => (v.people||[]).forEach(p => names.add(p.name)));
  document.getElementById('stat-people').textContent = names.size;
}

function updateDistrictPanel() {
  const dh = DANGHYUP[selectedGu] || [];
  const dhHtml = dh.map(d => `<div style="font-size:11px;color:var(--muted);margin-top:2px">${d.sub?`<span style="margin-right:4px;font-size:10px">${d.sub}</span>`:''}<span style="color:${d.self?'var(--accent)':'var(--text)'};font-weight:${d.self?700:400}">${d.name}</span><span style="margin-left:4px">${d.career}</span></div>`).join('');
  document.getElementById('district-panel').innerHTML = `<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:${dh.length?'6px':'0'}"><div class="gu-name">${selectedGu}</div><div class="gu-meta">방문 ${getVisitCount(selectedGu)}회</div></div>${dhHtml}`;
}

function renderLog() {
  let filtered = [...getVisits()].reverse();
  if (activeFilter !== 'all') filtered = filtered.filter(v => v.relation === activeFilter);
  const el = document.getElementById('log-list');
  if (!filtered.length) { el.innerHTML = '<div class="empty-msg">기록이 없습니다.</div>'; return; }
  el.innerHTML = filtered.map(v => `
    <div class="visit-card">
      <div class="vc-header">
        <div><div class="vc-gu">${v.gu}</div><div class="vc-place">${v.place}</div><div class="vc-date">${v.date}</div></div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="rel-dot ${v.relation||'none'}"></div>
          <button class="vc-del" data-key="${v._key}">×</button>
        </div>
      </div>
      ${(v.people||[]).length?`<div class="vc-people">${(v.people||[]).map(p=>`<span class="vc-person ${p.role}">${p.name}</span>`).join('')}</div>`:''}
      ${v.note?`<div class="vc-note">${v.note}</div>`:''}
    </div>`).join('');
}

function renderContacts() {
  const m = {};
  getVisits().forEach(v => (v.people||[]).forEach(p => {
    if (!m[p.name]) m[p.name] = { role: p.role, visits: [] };
    m[p.name].visits.push({ gu: v.gu, date: v.date });
  }));
  const el = document.getElementById('contact-list');
  const entries = Object.entries(m).sort((a,b) => b[1].visits.length - a[1].visits.length);
  if (!entries.length) { el.innerHTML = '<div class="empty-msg">접촉 인물이 없습니다.</div>'; return; }
  el.innerHTML = entries.map(([name, d]) => `
    <div class="contact-item">
      <div class="ci-name">${name}</div>
      <div class="ci-meta">${d.role} · ${[...new Set(d.visits.map(v=>v.gu))].join(', ')}</div>
      <div class="ci-visits">접촉 ${d.visits.length}회 · 최근 ${d.visits[d.visits.length-1].date}</div>
    </div>`).join('');
}

function refreshLayer() {
  if (!geojsonLayer) return;
  geojsonLayer.eachLayer(layer => {
    const gu = getGuName(layer.feature);
    layer.setStyle({ fillColor: getFillColor(getVisitCount(gu)), weight: gu===selectedGu?2:1, color: gu===selectedGu?'#c8a96e':'#2a2d35', fillOpacity: 0.82 });
  });
}

async function initMap() {
  mapObj = L.map('map', { center: [37.5665, 126.978], zoom: 11, zoomControl: true, attributionControl: false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(mapObj);
  labelLayer.addTo(mapObj);
  try {
    const res = await fetch(GEOJSON_URL);
    const data = await res.json();
    geojsonLayer = L.geoJSON(data, {
      style: f => ({ fillColor: getFillColor(getVisitCount(getGuName(f))), weight: 1, color: '#2a2d35', fillOpacity: 0.82 }),
      onEachFeature: (feature, layer) => {
        const gu = getGuName(feature);
        layer.bindTooltip(() => {
          const cnt = getVisitCount(gu);
          const names = new Set(); getVisits().filter(v=>v.gu===gu).forEach(v=>(v.people||[]).forEach(p=>names.add(p.name)));
          const dh = (DANGHYUP[gu]||[]).map(d=>`${d.sub?d.sub+' ':''}${d.name}`).join(' / ');
          return `<strong>${gu}</strong>${dh?' · '+dh:''}<br>방문 ${cnt}회${names.size?` · 접촉 ${names.size}명`:''}`;
        }, { sticky: true });
        layer.on('click', () => {
          selectedGu = gu; refreshLayer(); updateDistrictPanel();
          document.getElementById('add-placeholder').style.display = 'none';
          document.getElementById('add-form').style.display = 'flex';
          document.getElementById('inp-date').value = new Date().toISOString().slice(0,10);
          document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
          document.querySelector('[data-tab="add"]').classList.add('active');
          document.getElementById('tab-add').classList.add('active');
          const badge = document.getElementById('sel-badge'); badge.textContent = gu; badge.style.display = 'block';
        });
        layer.on('mouseover', function() { if (gu!==selectedGu) this.setStyle({ weight:2, color:'#4a5060' }); });
        layer.on('mouseout', function() { if (gu!==selectedGu) this.setStyle({ weight:1, color:'#2a2d35' }); });
      }
    }).addTo(mapObj);
    mapObj.fitBounds(geojsonLayer.getBounds(), { padding: [20, 20] });
    addLabels();
  } catch(e) { console.error(e); }
  mapObj.on('zoomend moveend', addLabels);
}

initMap();
</script>
</body>
</html>
